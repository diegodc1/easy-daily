services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/diegodc1/easy-daily.git}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        GIT_USERNAME: ${GIT_USERNAME:-}
        GIT_PASSWORD: ${GIT_PASSWORD:-}
    container_name: daily-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${POSTGRES_DB:-dailydb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-DailySystemJwtSecretKeyAtLeast32Bytes2026}
      APP_JWT_EXPIRATION: ${APP_JWT_EXPIRATION:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:80,http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/diegodc1/easy-daily.git}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        GIT_USERNAME: ${GIT_USERNAME:-}
        GIT_PASSWORD: ${GIT_PASSWORD:-}
    container_name: daily-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-80}:80"
