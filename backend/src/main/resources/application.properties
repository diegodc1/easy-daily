# JPA
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://10.10.51.188:5432/dailydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}


# CORS - Ajuste para o IP da rede interna
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://192.168.1.0/24,http://10.10.51.188:4200,http://10.10.51.188/24}

# JWT
app.jwt.secret=${APP_JWT_SECRET:SuaChaveSecretaMuitoSeguraParaJWTDailySystem2024}
app.jwt.expiration=${APP_JWT_EXPIRATION:432000000}

# Daily lock window timezone
app.daily.lock-zone=${APP_DAILY_LOCK_ZONE:America/Sao_Paulo}

# Protocol integration (Bitrix)
app.protocols.enabled=${APP_PROTOCOLS_ENABLED:false}
app.protocols.url-template=${APP_PROTOCOLS_URL_TEMPLATE:}
app.protocols.connect-timeout-ms=${APP_PROTOCOLS_CONNECT_TIMEOUT_MS:3000}
app.protocols.read-timeout-ms=${APP_PROTOCOLS_READ_TIMEOUT_MS:5000}

# Logging
logging.level.com.daily=INFO
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
